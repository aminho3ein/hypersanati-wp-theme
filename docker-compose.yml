services:

  db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.2-apache
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./theme/hypersanati:/var/www/html/wp-content/themes/hypersanati
      - ./wp-content/plugins:/var/www/html/wp-content/plugins   # ← جدید
      - wp_uploads:/var/www/html/wp-content/uploads               # ← جدید

volumes:
  db_data:
  wp_uploads:                                                     # ← جدید